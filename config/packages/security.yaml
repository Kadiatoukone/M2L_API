security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Gestionnaires
                property: identifiant
    
        adherent_provider:
            entity:
                class: App\Entity\Adherent
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login_check
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: identifiant
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        
        # Adhérents (appli mobile)
        login_adherent:
            pattern: ^/api/login_adherent_check
            stateless: true
            provider: adherent_provider
            json_login:
                check_path: /api/login_adherent_check
                username_path: email
                password_path: mot_de_passe
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: adherent_provider
            jwt: ~ 

    access_control:
        # Auth publique
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/login_adherent_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/adherents$, roles: PUBLIC_ACCESS, methods: [POST] }

        # Gestion des types de salles (lecture pour tous les gestionnaires)
        - { path: ^/api/types-salles, roles: IS_AUTHENTICATED_FULLY }

        # Gestion des salles (lecture + création + modification pour gestionnaires)
        - { path: ^/api/salles, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/mes-salles, roles: IS_AUTHENTICATED_FULLY }

        # Gestion des gestionnaires (super admin uniquement)
        - { path: ^/api/gestionnaires, roles: ROLE_SUPER_ADMIN }

        # Toutes les autres routes API nécessitent un token valide
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        - { path: ^/api/upload, roles: IS_AUTHENTICATED_FULLY }

    # Hiérarchie des rôles : SUPER_ADMIN hérite de GESTIONNAIRE
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_GESTIONNAIRE]