security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        gestionnaire_provider:
            entity:
                class: App\Entity\Gestionnaires
                property: identifiant

        adherent_provider:
            entity:
                class: App\Entity\Adherent
                property: email

        chain_provider:
            chain:
                providers: [gestionnaire_provider, adherent_provider]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            provider: gestionnaire_provider
            json_login:
                check_path: /api/login_check
                username_path: identifiant
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        login_adherent:
            pattern: ^/api/adherent/login
            stateless: true
            provider: adherent_provider
            json_login:
                check_path: /api/adherent/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: chain_provider
            jwt: ~

    access_control:
        # Auth publique gestionnaires
        - { path: ^/api/login, roles: PUBLIC_ACCESS }

        # Auth publique adhérents
        - { path: ^/api/adherent/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }

        # Gestion des types de salles
        - { path: ^/api/types-salles, roles: IS_AUTHENTICATED_FULLY }

        # Gestion des salles
        - { path: ^/api/salles, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/mes-salles, roles: IS_AUTHENTICATED_FULLY }

        # Gestion des gestionnaires (super admin uniquement)
        - { path: ^/api/gestionnaires, roles: ROLE_SUPER_ADMIN }

        # Upload
        - { path: ^/api/upload, roles: IS_AUTHENTICATED_FULLY }

        # Toutes les autres routes API nécessitent un token valide
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_GESTIONNAIRE]
