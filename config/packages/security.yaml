security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        # On dit à Symfony où chercher les utilisateurs pour la connexion
        app_user_provider:
            entity:
                class: App\Entity\Gestionnaires
                property: identifiant

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # La route pour se connecter et récupérer le Token
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: identifiant # Doit correspondre au 'property' du provider juste au-dessus
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
                
        api:
            pattern:   ^/api
            stateless: true
            jwt: ~ # Ici on active la vérification du token JWT

    access_control:
        # On autorise tout le monde à tenter de se connecter
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        
        # Exemple : Seul le SUPER_ADMIN peut accéder aux routes /api/gestionnaires
        - { path: ^/api/gestionnaires, roles: ROLE_SUPER_ADMIN }
        
        # Pour toutes les autres routes /api, il faut avoir un token valide
        - { path: ^/api,       roles: IS_AUTHENTICATED_FULLY }